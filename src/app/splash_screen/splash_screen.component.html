<div class="h-screen w-screen flex flex-col items-center justify-center relative text-center overflow-hidden bg-main-bg">
	<!-- Bloc logo + titre -->
	<div class="flex items-center gap-6 mb-5">
		<!-- Logo -->
		<img src="assets/img/logo.svg" alt="Logo" class="h-36 w-36 animate-appear" />

		<!-- Titre -->
		<div class="text-left">
			<h3 class="text-5xl font-bold md:text-7xl text-prime-blue animate-appear opacity-0 transition-colors duration-500">
				Aim
				<br />
				Display
			</h3>
		</div>
	</div>

	<!-- Sous-titre en dessous -->
	<p class="text-gray-500 text-xl max-w-xl animate-appear opacity-0 transition-colors duration-500 animation-delay-100">Chargement en cours...</p>
	<div class="flex items-center justify-center py-3 animate-appear opacity-0 transition-colors duration-500 animation-delay-100" aria-live="polite">
		<iconify-icon [icon]="icons.LOADING" class="text-[2.8rem] text-gray-500"></iconify-icon>
	</div>

	<!-- Footer inside the same container -->
	<footer class="text-gray-800 absolute bottom-[15px] left-0 w-full text-center">
		© 2025 par Hugo Eribon. Tous droits réservés.
	</footer>
</div>
