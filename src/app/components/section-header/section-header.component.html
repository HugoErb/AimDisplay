<div class="relative px-8 py-5 rounded-t-xl bg-white dark:bg-secondary-dark-bg border-b border-gray-200 dark:border-gray-700 transition-colors duration-500">
	<div class="flex items-center space-x-4">
		<div class="w-12 h-12 bg-gradient-to-br from-prime-blue to-hover-prime-blue rounded-xl flex items-center justify-center flex-shrink-0">
			<iconify-icon [icon]="icon" class="text-[1.6rem] text-white"></iconify-icon>
		</div>
		<div>
			<h1 class="text-xl font-bold text-gray-900 dark:text-gray-100 transition-colors duration-500">{{ title }}</h1>
			<p class="text-sm text-gray-500 dark:text-gray-400 mt-1 transition-colors duration-500">{{ subtitle }}</p>
		</div>
	</div>
</div>
